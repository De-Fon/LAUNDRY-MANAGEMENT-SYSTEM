services:
  - type: web
    name: campus-laundry-api
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: laundry-db
          property: connectionString
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ENVIRONMENT
        value: production

databases:
  - name: laundry-db
    databaseName: laundry_db
    user: laundry_user
